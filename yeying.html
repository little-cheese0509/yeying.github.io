        @font-face {
            font-family: "汇文明朝";
            src: url("汇文明朝体.otf") format("opentype");
            font-weight: normal;
            font-style: normal;
        }
        
        @font-face {
            font-family: "Glovia";
            src: url("Glovia.otf") format("opentype");
            font-weight: normal;
            font-style: normal;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #111;
            color: #fff;
            font-family: "Microsoft YaHei", sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }
        .game-box {
            width: 100vw;
            height: 100vh;
            position: relative;
            overflow: hidden;
        }
        .bg {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        
        /* 场景文本容器 */
        .scene-monologue-container {
            position: absolute;
            bottom: 220px;      
            left: 65%;         
            transform: translateX(-50%);
            width: 80vw;       
            height: auto;      
            z-index: 95;       
            display: none;     
        }

        .monologue-text {
            font-family: "汇文明朝", serif; 
            font-size: 20px;   
            color: #ffffff;    
            opacity: 0.9;      
            letter-spacing: 2px;
            line-height: 1.8;  
            text-indent: 2em;  
            white-space: pre-wrap;
        }

        /* 碎片计数器 UI */
        .ui-fragment {
            position: absolute;
            top: 25px;
            left: 25px;
            background: rgba(0,0,0,0.6);
            color: #e0e0e0;
            padding: 10px 20px;
            border-radius: 4px;
            border-left: 4px solid #a5cfff;
            font-family: "汇文明朝", serif;
            font-size: 18px;
            z-index: 200; 
            display: none; 
            pointer-events: none;
        }

        .chapter-title {
            position: absolute;
            top: 25px;
            right: 25px;
            background: rgba(0,0,0,0.7);
            color: #fff;
            padding: 10px 20px;
            border-radius: 5px;
            font-size: 16px;
            z-index: 100;
        }
        
        .jump-hint {
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            color: #ffffff;
            padding: 10px 20px;
            border-radius: 5px;
            animation: fadeInOut 2s infinite;
            z-index: 110;
        }
        
        @keyframes fadeInOut {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        .interaction-point {
            position: absolute;
            width: 5%;
            height: 8%;
            cursor: pointer;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }

        .popup {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0,0,0,0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }
        .popup.show {
            opacity: 1;
            visibility: visible;
        }
        .popup-content {
            max-width: 80%;
            max-height: 80%;
            border-radius: 10px;
        }
        .hide { display: none !important; }

        .gif-overlay {
          position: fixed;
          top: 0; left: 0;
          width: 100vw; height: 100vh;
          background: #000;
          z-index: 9999;
          display: none;
          justify-content: center;
          align-items: center;
        }
      

        .cover {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            z-index: 1000;
        }
        
        .cover-bg-base, .cover-bg-highlight, .spotlight-mask {
            position: absolute;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            object-fit: cover;
            z-index: -1; 
            pointer-events: none; 
        }
        .cover-bg-base { z-index: -3; }
        .spotlight-mask {
            z-index: -2;
            position: absolute;
            width: 600px; height: 600px;
            border-radius: 30%;
            background: rgba(255, 255, 255, 0.3);
            box-shadow: 0 0 160px 120px rgba(255, 255, 255, 0.3);
            filter: blur(50px);
            transform: translate(-50%, -50%);
        }
        .cover-bg-highlight {
            z-index: -1;
            clip-path: circle(300px at 50% 50%); 
        }
        
        .cover-buttons {
            display: flex;
            width: 100%;
            padding: 0 50px 60px 50px;
            justify-content: space-around;
            z-index: 10; 
        }
        .cover-btn {
            background: transparent;
            color: #ffffff;
            border: none;
            cursor: pointer;
            text-align: left;
        }
        .cover-btn-en { font-family: "Glovia"; font-size: 32px; letter-spacing: 3px; display: block; }
        .cover-btn-zh { font-family: "汇文明朝"; font-size: 24px; color: #999; }
        
        .typewriter-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 999;
        }
        .typewriter-text {
            width: 80vw;
            white-space: pre-wrap;
            font-family: "汇文明朝";
            font-size: 18px;
            text-align: center;
        }
/* 1. 全屏黑色遮罩层 */
#keyGameWrapper {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0, 0, 0, 0.9); /* 黑色半透明背景 */
    z-index: 9999;           /* 确保在最最最顶层 */
    display: none;          /* 初始状态隐藏 */
    justify-content: center; /* 左右居中 */
    align-items: center;     /* 上下居中 */
}

/* 2. 内部的游戏操作板 */
.game-board {
    width: 90%;
    height: 80%;
    display: flex;           /* 左右排列：左边锁孔，右边钥匙 */
    justify-content: space-around;
    align-items: center;
    border: 2px solid #555;  /* 调试用：看清边框，调好后可删 */
}

/* 3. 左侧锁孔区域 */
.lock-target {
    width: 600px; 
    height: 800px;
    display: flex;
    justify-content: center;
    align-items: center;
}

.lock-target img {
    width: 100%;
    height: 100%;
    object-fit: contain;
}

/* 4. 右侧钥匙堆区域 */
.keys-container {
    display: grid;
    grid-template-columns: repeat(2, 1fr); /* 两列排布 */
    gap: 30px;
    padding: 20px;
}

/* 5. 钥匙样式 */
.draggable-key {
    width: 300px;
    height: 450px;
    cursor: grab;
    touch-action: none; /* 防止手机端拖动干扰 */
    position: relative;
}

.draggable-key img {
    width: 100%;
    height: 100%;
    object-fit: contain;
}

/* 成功后的小弹窗层级最顶 */
#innerSuccessPopup { 
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
    z-index: 9999; display: none; cursor: pointer;
} 

/* 游戏说明文本 */
.game-instruction {
    position: absolute;
    top: 50px;
    left: 50%;
    transform: translateX(-50%);
    font-family: "汇文明朝", serif;
    font-size: 24px;
    color: #ffffff;
    text-align: center;
    z-index: 5500;
    text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
}
        .draggable-key img { max-width: 100%; max-height: 100%; pointer-events: none; }
        #innerSuccessPopup { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 9999; display: none; pointer-events: auto;
         }

/* ================= interaction6 抽屉与纸片双重弹窗样式 ================= */
#drawerWrapper {
    position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
    background: rgba(0, 0, 0, 0.85); display: none;
    justify-content: center; align-items: center; z-index: 8000;
}

.drawer-container {
    position: relative;
    width: 800px;
    max-width: 90%;
    display: flex; justify-content: center; align-items: center;
}

.drawer-bg {
    width: 100%; height: auto; pointer-events: none;
}

.papers-layout {
    position: absolute;
    bottom: 22%;
    width: 75%;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.clickable-paper {
    width: 28%;
    cursor: pointer;
    transition: transform 0.2s ease;
}

.clickable-paper:hover {
    transform: scale(1.05);
}

#paperDetailWrapper {
    position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
    background: rgba(0, 0, 0, 0.95); display: none;
    justify-content: center; align-items: center; z-index: 9000;
}

#paperDetailContent {
    max-width: 80%; max-height: 80%;
    object-fit: contain;
}
/* ===================================================================== */

/* ================= 线索拼贴游戏样式 ================= */
.custom-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    z-index: 9999;
    display: none;
    justify-content: center;
    align-items: center;
    background: rgba(0, 0, 0, 0.9);
}

#clueBoard {
    position: relative;
    width: 1200px;
    height: 800px;
    background: transparent;
}

.clue-bg {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: contain;
    pointer-events: none;
}

#clueLines {
    position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
    pointer-events: none; z-index: 80; /* 必须高于底图，低于scene5ui1 */
}

/* 连线的视觉样式 */
#clueLines line {
    stroke: #2439fb;         /* 1. 在这里修改颜色 (例如改为红色) */
    stroke-width: 3;        /* 2. 在这里修改连线的粗细 */
    stroke-linecap: round;  /* 3. 让连线的两端变圆润，不会显得生硬 */
    opacity: 0.8;           /* 4. 修改透明度 */
    

    
    transition: opacity 0.5s ease;
}

.fade-in-line {
    animation: fadeIn 0.8s forwards;
}

@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}



.clue-line.visible {
    opacity: 1;
}

.clue-slot {
    position: absolute;
    width: 150px;
    height: 180px;

    
    z-index: 10;
}

#finalKnife {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    max-width: 60%;
    opacity: 0;
    z-index: 15;
    transition: opacity 1s ease;
    pointer-events: none;
}

#finalKnife.visible {
    opacity: 1;
}

/* 导航栏容器：在clueBoard底部居中 */
#clueNavBar {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    width: 90%;
    height: 100px;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 30px;
    background: transparent;
    border: none;
    z-index: 100;
}

/* 导航栏碎片：放大尺寸 */
.draggable-clue {
    width: 120px;
    height: auto;
    cursor: grab;
    transition: transform 0.2s;
}

/* 鼠标悬停时的视觉效果 */
.draggable-clue:hover {
    transform: scale(1.15);
}

.draggable-clue:active {
    cursor: grabbing;
}

/* 放错时的震动提示动画 */
@keyframes shake-error {
    0% { transform: translateX(0); }
    25% { transform: translateX(-5px) rotate(-5deg); }
    50% { transform: translateX(5px) rotate(5deg); }
    75% { transform: translateX(-5px) rotate(-5deg); }
    100% { transform: translateX(0); }
}

.error-shake {
    animation: shake-error 0.3s ease;
}

            box-shadow: 0 0 15px #fff;

function initKeyPuzzle() {
    const wrapper = document.getElementById('keyGameWrapper');
    // 先设为 flex 布局，这样内部元素才能正确排列位置
    wrapper.style.display = 'flex'; 
    
    // 强制浏览器刷新布局
    void wrapper.offsetWidth; 
    
    // 再添加 active 类触发渐显动画
    wrapper.classList.add('active');
    
    const keys = document.querySelectorAll('.draggable-key');
    const hitZone = document.getElementById('lockDetection');
    
    keys.forEach(key => {
        let isDragging = false;
        let startX, startY, currentX = 0, currentY = 0;

        // 核心：确保每一把钥匙都能监听按下事件
        key.onmousedown = (e) => {
            if (key.dataset.done === "true") return; 
            
            isDragging = true;
            key.style.zIndex = "5001"; // 提起被选中的钥匙
            startX = e.clientX;
            startY = e.clientY;

            // 获取之前的位移量
            const style = window.getComputedStyle(key);
            const matrix = new DOMMatrixReadOnly(style.transform);
            currentX = matrix.m41;
            currentY = matrix.m42;
            
            e.preventDefault();
        };

        // 全局监听移动，防止鼠标移动太快脱离钥匙
        const onMouseMove = (e) => {
            if (!isDragging) return;
            const dx = e.clientX - startX;
            const dy = e.clientY - startY;
            key.style.transform = `translate(${currentX + dx}px, ${currentY + dy}px)`;
        };

        const onMouseUp = (e) => {
            if (!isDragging) return;
            isDragging = false;
            key.style.zIndex = "5000";

            const kRect = key.getBoundingClientRect();
            const hRect = hitZone.getBoundingClientRect();

            // 碰撞检测
            const isMatch = (
                kRect.left + kRect.width/4 > hRect.left &&
                kRect.left + kRect.width/4 < hRect.right &&
                kRect.top + kRect.height/4 > hRect.top &&
                kRect.top + kRect.height/4 < hRect.bottom
            );

            if (isMatch && key.dataset.id === "4") {
                // 4号正确匹配
                key.style.transition = 'opacity 0.8s';
                key.style.opacity = '0';
                key.dataset.done = "true";
                // 确保调用名字准确
                setTimeout(handleKeyGameSuccess, 1000);
            } else {
                // 判定失败或非4号：随机微弱弹开并停住
                const angle = Math.random() * Math.PI * 2;
                const force = 40; 
                const finalX = (currentX + (e.clientX - startX)) + Math.cos(angle) * force;
                const finalY = (currentY + (e.clientY - startY)) + Math.sin(angle) * force;
                
                key.style.transition = 'transform 0.4s ease-out';
                key.style.transform = `translate(${finalX}px, ${finalY}px)`;
            }
        };

        document.addEventListener('mousemove', onMouseMove);
        document.addEventListener('mouseup', onMouseUp);
    });
}

function runScene7ui01() {

    let isTyping = true;
    let typeInterval;
    const textEl = document.getElementById('scene7ui01Text');

    function type() {
        if (index < script.length) {

            if (charIndex < text.length) {
                textEl.textContent += text.charAt(charIndex);
                charIndex++;
                typeInterval = setTimeout(type, typingSpeed);
            } else {
                isTyping = false;
                clearTimeout(typeInterval);
            }
        }
    }
    type();
    
    const skipClickHandler = (e) => {
        if (isTyping) {
            clearTimeout(typeInterval);

        } else {
            index++;

                charIndex = 0;
                textEl.textContent = "";
                isTyping = true;
                type();
            } else {
                document.removeEventListener('click', skipClickHandler);
                const ui = document.getElementById('scene7ui01');

        }

function showGoodEnd() {
    const dark = document.createElement("div");
    dark.id = "endScreen";
    dark.style.cssText = "position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(0,0,0,0);z-index:99999;transition:background 1s ease;";
    document.body.appendChild(dark);
    
    setTimeout(() => {
        dark.style.background = "rgba(0,0,0,1)";
        setTimeout(() => {
            const text = document.createElement("div");
            text.textContent = "THE GOOD END";
            text.style.cssText = "position:fixed;top:50%;left:50%;transform:translate(-50%, -50%);font-family:'汇文明朝',serif;font-size:32px;color:#ffffff;z-index:100000;opacity:0;transition:opacity 0.5s ease;";
            dark.appendChild(text);
            setTimeout(() => {
                text.style.opacity = "1";
            }, 500);
        }, 500);
    }, 100);
    
    const handleClick = () => {
        dark.remove();
        document.removeEventListener('click', handleClick);
        location.reload();
    };
    
    setTimeout(() => {
        document.addEventListener('click', handleClick);
    }, 2000);
}

        nextScene = 3; gifPath = "C:/Users/lenovo/Desktop/images/3.gif";
    } else if (currentScene === 3) {
        allClicked = ["interaction6"].every(id => document.getElementById(id).clicked);
        nextScene = 4; gifPath = "C:/Users/lenovo/Desktop/images/4.gif";
    } else if (currentScene === 4) {
        allClicked = ["interaction7", "interaction8", "interaction9", "interaction10"].every(id => document.getElementById(id).clicked);
        nextScene = 5; gifPath = "C:/Users/lenovo/Desktop/images/5.gif";
    } else if (currentScene === 5) {

        { from: 1, to: 5, x1: '81%', y1: '47%', x2: '56%', y2: '41%' },  // 1-5 线段
        { from: 2, to: 4, x1: '80%', y1: '27%', x2: '31%', y2: '31%' },  // 2-4 线段
        { from: 3, to: 4, x1: '9%', y1: '34%', x2: '31%', y2: '31%' },  // 3-4 线段
        { from: 3, to: 6, x1: '9%', y1: '34%', x2: '54%', y2: '55%' },  // 3-6 线段
        { from: 5, to: 6, x1: '56%', y1: '41%', x2: '54%', y2: '55%' }   // 5-6 线段
    ];

    const draggables = document.querySelectorAll('.draggable-clue');
    const slots = document.querySelectorAll('.clue-slot');

    // --- 1. 设置拖拽和悬停的视图切换 ---
    draggables.forEach(item => {
        const id = item.dataset.id;
        
        // 鼠标悬停变样
        item.addEventListener('mouseover', () => {
            if (!item.matched) item.src = `C:/Users/lenovo/Desktop/images/${id}${id}.png`;
        });
        
        // 鼠标移出恢复
        item.addEventListener('mouseout', () => {
            if (!item.matched) item.src = `C:/Users/lenovo/Desktop/images/${id}.png`;
        });

        // 开始拖拽：记录ID，并保持高亮视图
        item.addEventListener('dragstart', (e) => {
            if (item.matched) {
                e.preventDefault(); // 已经拼好的不能再拖
                return;
            }
            e.dataTransfer.setData('text/plain', id);
            item.src = `C:/Users/lenovo/Desktop/images/${id}${id}.png`;
        });

        // 拖拽结束（无论是放对还是放错都会触发）
        item.addEventListener('dragend', (e) => {
            // 如果没放对（即 matched 标记依然是 false），恢复原状
            if (!item.matched) {
                item.src = `C:/Users/lenovo/Desktop/images/${id}.png`;
            }
        });
    });

    // --- 2. 设置目标槽位的判定 ---
    slots.forEach(slot => {
        slot.addEventListener('dragover', (e) => {
            e.preventDefault(); // 必须阻止默认行为才能接收拖放
        });

        slot.addEventListener('drop', (e) => {
            e.preventDefault();
            const draggedId = e.dataTransfer.getData('text/plain');
            const targetAcceptId = slot.dataset.accept;
            const draggedElement = document.querySelector(`.draggable-clue[data-id="${draggedId}"]`);
            
            // 判定 1：完全匹配且当前槽位为空
            if (draggedId === targetAcceptId && !slotStatus[targetAcceptId]) {
                // 固定元素
                slot.appendChild(draggedElement);
                draggedElement.style.width = '100%';
                draggedElement.style.height = '100%';
                draggedElement.style.objectFit = 'contain';
                draggedElement.draggable = false;
                draggedElement.matched = true;
                
                // 恢复为无高亮状态（可根据你实际需求决定这里要不要保持高亮，这里设定为恢复基础样子）
                draggedElement.src = `C:/Users/lenovo/Desktop/images/${draggedId}.png`;
                
                slotStatus[targetAcceptId] = true;
                matchedCount++;
                checkAndDrawLines();

                if (matchedCount === totalClues) {
                    triggerWinState();
                }
            }
            // 判定 2：匹配错误
            else {
                // 如果错了，元素会自然回到原位，我们加一个震动提示它错了
                draggedElement.classList.add('error-shake');
                setTimeout(() => {
                    draggedElement.classList.remove('error-shake');
                }, 300);
            }
        });
    });

    // 画线函数（使用预设的坐标值）
    function checkAndDrawLines() {
        requiredConnections.forEach(lineConfig => {
            const id1 = lineConfig.from;
            const id2 = lineConfig.to;

            // 只有当两个碎片都已匹配时才画线
            if (slotStatus[id1] && slotStatus[id2]) {
                drawSvgLine(lineConfig);
            }
        });
    }

    // 使用 SVG 在全屏容器上动态画线（使用预设坐标，基于弹窗大小）
    function drawSvgLine(lineConfig) {
        const svg = document.getElementById('clueLines');
        const board = document.getElementById('clueBoard');
        
        // 获取弹窗的位置和尺寸
        const boardRect = board.getBoundingClientRect();
        
        // 将百分比坐标转换为基于弹窗的像素坐标
        function percentToPixel(percent, total) {
            return boardRect.left + (parseFloat(percent) / 100) * boardRect.width;
        }
        
        function percentToPixelY(percent, total) {
            return boardRect.top + (parseFloat(percent) / 100) * boardRect.height;
        }
        
        const x1 = percentToPixel(lineConfig.x1, boardRect.width);
        const y1 = percentToPixelY(lineConfig.y1, boardRect.height);
        const x2 = percentToPixel(lineConfig.x2, boardRect.width);
        const y2 = percentToPixelY(lineConfig.y2, boardRect.height);
        
        const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
        line.setAttribute("x1", x1);
        line.setAttribute("y1", y1);
        line.setAttribute("x2", x2);
        line.setAttribute("y2", y2);
        line.classList.add("fade-in-line");
        svg.appendChild(line);
    }

    // 通关逻辑
    function triggerWinState() {
        // 隐藏计数UI
        document.getElementById('fragmentUI').style.display = 'none';
        
        setTimeout(() => {
            // 隐藏其他内容，保留线条
            document.querySelector('.clue-bg').style.opacity = '0';
            document.getElementById('clueNavBar').style.opacity = '0';
            slots.forEach(s => s.style.opacity = '0');
            
            // 移除刀的显示
            document.getElementById('finalKnife').style.opacity = '0';

            // 等待1秒后显示scene5ui1
            setTimeout(() => {
                // 隐藏游戏容器，但保留线条
                document.getElementById('clueGameWrapper').style.display = 'none';
                // 确保线条保持显示
                document.getElementById('clueLines').style.display = 'block';
                document.getElementById('clueLines').style.opacity = '1';
                startScene5ui1();
            }, 1000);
        }, 500);
    }
}

function runScene5ui1() {
    const script = scene5ui1Text;
    let index = 0;
    let charIndex = 0;
    const textEl = document.getElementById('scene5ui1Text');
    textEl.textContent = "";
    
    function type() {
        if (index < script.length) {
            const text = script[index];
            if (charIndex < text.length) {
                textEl.textContent += text.charAt(charIndex);
                charIndex++;
                setTimeout(type, typingSpeed);
            } else {
                // 文本显示完毕，等待用户点击
                const handleClick = () => {
                    document.removeEventListener('click', handleClick);
                    // 隐藏UI和线条
                    const ui = document.getElementById('scene5ui1');
                    const lines = document.getElementById('clueLines');
                    
                    ui.style.opacity = "0";
                    lines.style.opacity = "0";
                    
                    setTimeout(() => {
                        ui.style.display = "none";
                        lines.style.display = "none";
                        
                        // 显示跳转提示
                        const hint = document.createElement("div");
                        hint.className = "jump-hint";
                        hint.id = "jumpHintElement";
                        hint.textContent = "点击屏幕跳转下一章";
                        document.querySelector(".game-box").appendChild(hint);
                        
                        const jumpHandle = () => {
                            document.getElementById("jumpHintElement").remove();
                            document.removeEventListener("click", jumpHandle);
                            
                            // 跳转到场景6
                            const dark = document.createElement("div");
                            dark.style.cssText = "position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(0,0,0,0);z-index:9998;transition:background 1s ease;pointer-events:none;";
                            document.body.appendChild(dark);
                            requestAnimationFrame(() => dark.style.background = "rgba(0,0,0,1)");
                            
                            setTimeout(() => {
                                const gif = document.getElementById('gifOverlay');
                                document.getElementById('transitionGif').src = "C:/Users/lenovo/Desktop/images/6.gif";
                                gif.style.display = 'flex';
                                dark.remove();
                                setTimeout(() => {
                                    gif.style.display = 'none';
                                    initScene6();
                                }, 1800);
                            }, 1000);
                        };
                        document.addEventListener("click", jumpHandle);
                    }, 1000);
                };
                document.addEventListener('click', handleClick);
            }
        }
    }
    type();
}

function typeWriterEffect(element, text, callback) {
    element.textContent = "";
    let i = 0;
    const timer = setInterval(() => {
        if (i < text.length) {
            element.textContent += text.charAt(i);
            i++;
        } else {
            clearInterval(timer);
            if (callback) callback();
        }
    }, 50);
}
